name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0). When empty, uses the tag name."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .app
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          xcodebuild \
            -project BeautyR1Clicker.xcodeproj \
            -scheme BeautyR1Clicker \
            -configuration Release \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION=1 \
            build

      - name: Locate built .app
        id: locate
        run: |
          APP_DIR=$(xcodebuild \
            -project BeautyR1Clicker.xcodeproj \
            -scheme BeautyR1Clicker \
            -configuration Release \
            -showBuildSettings 2>/dev/null \
            | awk -F' = ' '/^ *BUILT_PRODUCTS_DIR /{print $2; exit}')
          echo "app_dir=$APP_DIR" >> "$GITHUB_OUTPUT"

      - name: Zip the bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          APP_DIR: ${{ steps.locate.outputs.app_dir }}
        run: |
          cd "$APP_DIR"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent \
            BeautyR1Clicker.app \
            "$GITHUB_WORKSPACE/BeautyR1Clicker-${VERSION}.zip"

      - name: Compute SHA256
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          shasum -a 256 "BeautyR1Clicker-${VERSION}.zip" | tee BeautyR1Clicker-sha256.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BeautyR1Clicker-*.zip
            BeautyR1Clicker-sha256.txt
          generate_release_notes: true

      - name: Update Cask version & sha256
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          SHA=$(awk '{print $1}' BeautyR1Clicker-sha256.txt)
          sed -i '' -E "s/^(  version )\".*\"/\1\"${VERSION}\"/" Casks/beauty-r1-clicker.rb
          sed -i '' -E "s/^(  sha256 )\".*\"/\1\"${SHA}\"/" Casks/beauty-r1-clicker.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add Casks/beauty-r1-clicker.rb
          if ! git diff --cached --quiet; then
            git commit -m "Update Cask to v${VERSION}"
            git push origin main
          fi

      - name: Upload artifact (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: BeautyR1Clicker-${{ steps.ver.outputs.version }}
          path: |
            BeautyR1Clicker-*.zip
            BeautyR1Clicker-sha256.txt
